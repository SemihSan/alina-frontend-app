<svg width="800" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fda085;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff4a3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.3"/>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)"/>
  
  <!-- Gold coin circle with shadow -->
  <circle cx="400" cy="400" r="300" fill="url(#goldGrad)" filter="url(#shadow)" stroke="#d4af37" stroke-width="12"/>
  
  <!-- Inner shine effect -->
  <circle cx="400" cy="400" r="280" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" opacity="0.8"/>
  <circle cx="400" cy="400" r="260" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" opacity="0.6"/>
  
  <!-- Gold bar icon (rectangle with shine) -->
  <rect x="280" y="220" width="240" height="120" rx="8" fill="#ffd700" stroke="#d4af37" stroke-width="4" filter="url(#shadow)"/>
  <rect x="285" y="225" width="230" height="110" rx="6" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  
  <!-- Diagonal shine on gold bar -->
  <path d="M 320 220 L 480 260 L 460 340 L 300 300 Z" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Text: GRAM ALTIN -->
  <text x="400" y="410" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="#8b6914" text-anchor="middle" filter="url(#shadow)">
    GRAM ALTIN
  </text>
  
  <!-- Text: 24 Ayar -->
  <text x="400" y="460" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#6b5410" text-anchor="middle">
    24 Ayar Külçe
  </text>
  
  <!-- Decorative stars -->
  <text x="280" y="410" font-size="32" fill="#ffed4e">⭐</text>
  <text x="520" y="410" font-size="32" fill="#ffed4e">⭐</text>
  
  <!-- Premium badge circle -->
  <circle cx="650" cy="150" r="60" fill="#d4af37" filter="url(#shadow)"/>
  <circle cx="650" cy="150" r="55" fill="#ffd700"/>
  <text x="650" y="145" font-size="40" text-anchor="middle">💎</text>
  <text x="650" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#8b6914" text-anchor="middle">PREMIUM</text>
</svg>
